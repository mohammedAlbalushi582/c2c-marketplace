# Full local stack: Postgres (two DBs) + migrations + Go backend + Next.js frontend + Strapi CMS.
#   docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alamjad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alamjad_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-alamjad}
      # Consumed by the init script to create Strapi's separate database.
      STRAPI_DB_NAME: ${STRAPI_DB_NAME:-strapi}
      STRAPI_DB_USER: ${STRAPI_DB_USER:-strapi}
      STRAPI_DB_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alamjad} -d ${POSTGRES_DB:-alamjad}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Applies app schema migrations, then exits.
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-alamjad}:${POSTGRES_PASSWORD:-alamjad_dev_pw}@postgres:5432/${POSTGRES_DB:-alamjad}?sslmode=disable
      - up
    restart: "no"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-alamjad}:${POSTGRES_PASSWORD:-alamjad_dev_pw}@postgres:5432/${POSTGRES_DB:-alamjad}?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # Strapi — static/marketing content only, on its OWN database.
  # Reads generated secrets (APP_KEYS, *_SALT, *_SECRET) from cms/.env.
  cms:
    build: ./cms
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./cms/.env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${STRAPI_DB_NAME:-strapi}
      DATABASE_USERNAME: ${STRAPI_DB_USER:-strapi}
      DATABASE_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi_dev_pw}
      DATABASE_SSL: "false"
    ports:
      - "1337:1337"

volumes:
  pgdata:
  uploads:
