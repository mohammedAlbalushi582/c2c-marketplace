# Full local stack: Postgres + migrations + Go backend + Next.js frontend.
#   docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alamjad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alamjad_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-alamjad}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alamjad} -d ${POSTGRES_DB:-alamjad}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Applies app schema migrations, then exits.
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-alamjad}:${POSTGRES_PASSWORD:-alamjad_dev_pw}@postgres:5432/${POSTGRES_DB:-alamjad}?sslmode=disable
      - up
    restart: "no"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-alamjad}:${POSTGRES_PASSWORD:-alamjad_dev_pw}@postgres:5432/${POSTGRES_DB:-alamjad}?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
      # Where the browser is sent for payment checkout / return.
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      # Payment gateway: "stub" (default, simulated) or "thawani".
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stub}
      THAWANI_BASE_URL: ${THAWANI_BASE_URL:-https://uatcheckout.thawani.om/api/v1}
      THAWANI_SECRET_KEY: ${THAWANI_SECRET_KEY:-}
      THAWANI_PUBLISHABLE_KEY: ${THAWANI_PUBLISHABLE_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    environment:
      # Server-side (SSR/sitemap) reaches the backend inside the compose network.
      API_INTERNAL_URL: http://backend:8080/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
