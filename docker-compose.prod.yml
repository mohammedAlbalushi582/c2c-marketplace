# Production overlay. Run together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# nginx becomes the only publicly exposed service (80/443). The app services keep
# their published host ports removed so they are only reachable inside the network.
services:
  postgres:
    ports: !reset []          # DB not exposed publicly
    restart: unless-stopped

  backend:
    environment:
      APP_ENV: production
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-alamjad}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alamjad}?sslmode=disable
      # Public origin — used to build absolute image URLs and to lock CORS.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_BASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      UPLOAD_DIR: /app/uploads
      # Payments: buyers are sent to the public site for checkout/return.
      FRONTEND_BASE_URL: ${PUBLIC_BASE_URL}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stub}
      THAWANI_BASE_URL: ${THAWANI_BASE_URL:-https://checkout.thawani.om/api/v1}
      THAWANI_SECRET_KEY: ${THAWANI_SECRET_KEY:-}
      THAWANI_PUBLISHABLE_KEY: ${THAWANI_PUBLISHABLE_KEY:-}
    ports: !reset []          # fronted by nginx
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Relative path -> the browser calls the same origin; nginx proxies /api to backend.
        NEXT_PUBLIC_API_URL: /api/v1
        # Your public HTTPS domain — canonical URLs, Open Graph, sitemap.
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_BASE_URL}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
    environment:
      # SSR/sitemap reach the backend directly inside the network.
      API_INTERNAL_URL: http://backend:8080/api/v1
    ports: !reset []          # fronted by nginx
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
